<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Construct Font Fixer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      padding: 14px;
    }
    .name {
      font-size: 13px;
      font-weight: 600;
      color: #111;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .label {
      font-size: 13px;
      color: #444;
    }
    .toggle { position: relative; width: 36px; height: 20px; cursor: pointer; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #ccc;
      border-radius: 10px;
      transition: background 0.15s;
    }
    .slider::before {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.15s;
    }
    input:checked + .slider { background: #333; }
    input:checked + .slider::before { transform: translateX(16px); }
    .status {
      font-size: 11px;
      color: #999;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="name">Construct Font Fixer</div>
  <div class="row">
    <span class="label">Enable fix</span>
    <label class="toggle">
      <input type="checkbox" id="toggle" />
      <span class="slider"></span>
    </label>
  </div>
  <div class="status" id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
